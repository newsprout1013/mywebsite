<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#241733">
<link rel="manifest" href="choujian-manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>佛法法語抽籤</title>
<style>
:root {
  --purple:#3d2a52; --purple-deep:#241733;
  --gold:#c9a227; --gold-light:#ecd98f; --gold-deep:#8f6c17;
  --cream:#f5efe2; --paper:#fffaf5;
  --ink:#241a12; --muted:#69604f;
}
* { box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; }
body {
  background:var(--cream); color:var(--ink);
  font-family:"Noto Serif TC","Source Han Serif TC","PingFang TC","微軟正黑體",serif;
  font-size:20px; line-height:2;
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center;
  padding-bottom:3rem;
  overflow-x:hidden;
}

/* ── Header ── */
header {
  position:relative; overflow:hidden;
  width:100%;
  background:linear-gradient(180deg, var(--purple) 0%, var(--purple-deep) 100%);
  color:var(--gold-light);
  text-align:center;
  padding:2.4rem 1.5rem 2rem;
  border-bottom:6px solid var(--gold);
  box-shadow:0 3px 12px rgba(0,0,0,.3);
}
header h1 {
  position:relative; z-index:1;
  font-size:2.1rem; font-weight:900; letter-spacing:.25em;
  color:#fdf3d8;
  text-shadow:0 1px 3px rgba(0,0,0,.5);
}
header p {
  position:relative; z-index:1;
  margin-top:.7rem; font-size:1.05rem; letter-spacing:.2em; color:var(--gold-light); opacity:.9;
}
.mote {
  position:absolute; bottom:-10px; border-radius:50%;
  background:radial-gradient(circle, var(--gold-light) 0%, transparent 70%);
  opacity:0; animation:floatUp 7s ease-in-out infinite;
}
.mote:nth-child(1){ left:12%; width:10px; height:10px; animation-delay:0s; }
.mote:nth-child(2){ left:28%; width:6px; height:6px; animation-delay:1.6s; }
.mote:nth-child(3){ left:52%; width:8px; height:8px; animation-delay:3.1s; }
.mote:nth-child(4){ left:70%; width:5px; height:5px; animation-delay:.8s; }
.mote:nth-child(5){ left:86%; width:9px; height:9px; animation-delay:2.4s; }
@keyframes floatUp {
  0% { transform:translateY(0) scale(.7); opacity:0; }
  15% { opacity:.65; }
  85% { opacity:.2; }
  100% { transform:translateY(-90px) scale(1.15); opacity:0; }
}

/* ── Main ── */
main {
  width:100%; max-width:560px;
  padding:2.2rem 1.3rem 0;
  display:flex; flex-direction:column; align-items:center;
  gap:1.8rem;
}

/* 籤筒 */
.tube-wrap { width:150px; height:180px; position:relative; }
.tube-body {
  position:absolute; bottom:0; left:0; right:0; height:118px;
  background:linear-gradient(180deg, var(--purple) 0%, var(--purple-deep) 100%);
  border:3px solid var(--gold); border-radius:14px 14px 26px 26px;
  box-shadow:inset 0 8px 14px rgba(0,0,0,.35), 0 6px 12px rgba(0,0,0,.25);
  transition:transform .08s;
}
.tube-rim {
  position:absolute; bottom:110px; left:-4px; right:-4px; height:16px;
  background:linear-gradient(180deg, var(--gold-light), var(--gold));
  border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,.3);
}
.tube-wrap.shaking .tube-body,
.tube-wrap.shaking .tube-rim { animation:shake .6s ease-in-out; }
@keyframes shake {
  0%,100% { transform:rotate(0deg) translateX(0); }
  10% { transform:rotate(-5deg) translateX(-3px); }
  20% { transform:rotate(5deg) translateX(3px); }
  30% { transform:rotate(-7deg) translateX(-4px); }
  40% { transform:rotate(7deg) translateX(4px); }
  50% { transform:rotate(-5deg) translateX(-2px); }
  60% { transform:rotate(5deg) translateX(2px); }
  70% { transform:rotate(-3deg); }
  80% { transform:rotate(3deg); }
  90% { transform:rotate(-1deg); }
}
.stick {
  position:absolute; bottom:114px; width:9px; height:78px;
  border-radius:3px 3px 0 0;
  background:linear-gradient(180deg, var(--gold-light) 0%, var(--gold-deep) 100%);
  box-shadow:0 2px 3px rgba(0,0,0,.2);
  transform-origin:bottom center;
}
.stick::after {
  content:''; position:absolute; top:-6px; left:-1.5px; width:12px; height:12px;
  border-radius:50%; background:#a4283a; box-shadow:0 0 0 2px var(--gold-light);
}
.stick.s1 { left:24px; height:82px; transform:rotate(-9deg); }
.stick.s2 { left:44px; height:92px; transform:rotate(-3deg); }
.stick.s3 { left:66px; height:98px; transform:rotate(2deg); }
.stick.s4 { left:88px; height:88px; transform:rotate(7deg); }
.stick.s5 { left:108px; height:76px; transform:rotate(12deg); }
.stick.flying {
  animation:flyOut .6s cubic-bezier(.3,.6,.4,1) forwards;
}
@keyframes flyOut {
  0% { opacity:1; }
  60% { opacity:1; }
  100% { transform:translateY(-190px) rotate(28deg); opacity:0; }
}

/* 結果卡 */
.result-card {
  width:100%; min-height:230px;
  background:var(--paper);
  border:3px solid var(--gold);
  outline:1px solid var(--gold-light);
  outline-offset:6px;
  border-radius:12px;
  padding:2.3rem 1.8rem;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; gap:1.1rem;
}
.result-card.show { animation:revealCard .5s ease-out; }
@keyframes revealCard {
  from { opacity:0; transform:translateY(16px) scale(.96); }
  to { opacity:1; transform:translateY(0) scale(1); }
}
.hint-text { color:var(--muted); font-size:1.12rem; letter-spacing:.12em; line-height:2.1; }

.tag {
  display:inline-block; background:var(--purple); color:var(--gold-light);
  font-size:1rem; letter-spacing:.3em; text-indent:.3em;
  padding:.35rem 1rem; border-radius:999px; font-family:sans-serif;
}
.quote {
  font-size:1.55rem; font-weight:700; color:var(--ink);
  line-height:2.1; letter-spacing:.05em;
}
.source { font-size:1.1rem; color:var(--purple); letter-spacing:.1em; }

/* ── Button ── */
.btn {
  width:100%; max-width:320px;
  font-family:inherit; font-size:1.4rem; font-weight:800; letter-spacing:.4em; text-indent:.4em;
  background:linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 55%, var(--gold-deep) 100%);
  color:var(--purple-deep);
  border:2px solid var(--gold-deep);
  border-radius:12px;
  padding:1.05rem 1rem;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,.25);
  transition:transform .12s, box-shadow .12s;
}
.btn:active { transform:translateY(2px) scale(.98); box-shadow:0 2px 5px rgba(0,0,0,.25); }
.btn:disabled { opacity:.65; }

footer {
  margin-top:.5rem; padding:0 1.5rem;
  font-size:1rem; color:var(--muted); letter-spacing:.1em; text-align:center; line-height:1.9;
}

@media (prefers-reduced-motion: reduce) {
  .mote, .tube-wrap.shaking .tube-body, .tube-wrap.shaking .tube-rim,
  .stick.flying, .result-card.show { animation:none !important; }
}
</style>
</head>
<body>

<header>
  <span class="mote"></span><span class="mote"></span><span class="mote"></span>
  <span class="mote"></span><span class="mote"></span>
  <h1>佛 法 法 語</h1>
  <p>誠 心 抽 籤 ‧ 靜 心 觀 照</p>
</header>

<main>
  <div class="tube-wrap" id="tube">
    <div class="stick s1"></div>
    <div class="stick s2"></div>
    <div class="stick s3"></div>
    <div class="stick s4"></div>
    <div class="stick s5"></div>
    <div class="tube-rim"></div>
    <div class="tube-body"></div>
  </div>

  <div class="result-card" id="card">
    <div class="hint-text" id="cardInner">合掌　靜心　默念所求<br>準備好了，請點下方「抽籤」</div>
  </div>

  <button class="btn" id="drawBtn">抽　　籤</button>

  <footer>法語隨緣而得，僅供靜心參考，不作占卜之用</footer>
</main>

<script>
const quotes = [
  { text:"一切有為法，如夢幻泡影，如露亦如電，應作如是觀。", source:"《金剛經》", tag:"智慧" },
  { text:"應無所住而生其心。", source:"《金剛經》", tag:"智慧" },
  { text:"色即是空，空即是色。", source:"《心經》", tag:"智慧" },
  { text:"不生不滅，不垢不淨，不增不減。", source:"《心經》", tag:"智慧" },
  { text:"若人欲了知，三世一切佛，應觀法界性，一切唯心造。", source:"《華嚴經》", tag:"智慧" },
  { text:"千江有水千江月，萬里無雲萬里天。", source:"古德法語", tag:"智慧" },
  { text:"一花一世界，一葉一如來。", source:"禪語", tag:"智慧" },

  { text:"大慈大悲愍眾生，大喜大捨濟含識。", source:"《大悲心陀羅尼》", tag:"慈悲" },
  { text:"慈悲沒有敵人，智慧不起煩惱。", source:"星雲大師", tag:"慈悲" },
  { text:"但願眾生得離苦，不為自己求安樂。", source:"《華嚴經》", tag:"慈悲" },
  { text:"愛出者愛返，福往者福來。", source:"古德法語", tag:"慈悲" },
  { text:"未成佛道，先結人緣。", source:"印光大師", tag:"慈悲" },

  { text:"諸法因緣生，諸法因緣滅。", source:"佛門常語", tag:"因果" },
  { text:"欲知前世因，今生受者是；欲知來世果，今生作者是。", source:"《三世因果經》", tag:"因果" },
  { text:"因上努力，果上隨緣。", source:"佛門常語", tag:"因果" },
  { text:"種瓜得瓜，種豆得豆。", source:"古德法語", tag:"因果" },

  { text:"放下屠刀，立地成佛。", source:"禪語", tag:"放下" },
  { text:"菩提本無樹，明鏡亦非台，本來無一物，何處惹塵埃。", source:"六祖惠能", tag:"放下" },
  { text:"煩惱即菩提。", source:"禪語", tag:"放下" },
  { text:"時時勤拂拭，勿使惹塵埃。", source:"神秀禪師", tag:"放下" },
  { text:"一念放下，萬般自在。", source:"古德法語", tag:"放下" },

  { text:"是日已過，命亦隨減，如少水魚，斯有何樂？大眾當勤精進，如救頭燃，但念無常，慎勿放逸。", source:"普賢警眾偈", tag:"精進" },
  { text:"修行是點滴功夫，不在一時。", source:"古德法語", tag:"精進" },
  { text:"人身難得，佛法難聞，此身不向今生度，更向何生度此身。", source:"《勸發菩提心文》", tag:"精進" },
  { text:"有佛法就有辦法。", source:"星雲大師", tag:"精進" },

  { text:"心平何勞持戒，行直何用參禪。", source:"六祖惠能", tag:"清淨" },
  { text:"心淨則國土淨。", source:"《維摩詰經》", tag:"清淨" },
  { text:"心是根，法是塵，兩種猶如鏡上痕，痕垢盡除光始現，心法雙忘性即真。", source:"禪語", tag:"清淨" },
  { text:"諸惡莫作，眾善奉行，自淨其意，是諸佛教。", source:"七佛通戒偈", tag:"清淨" },

  { text:"凡所有相，皆是虛妄，若見諸相非相，即見如來。", source:"《金剛經》", tag:"無常" },
  { text:"無常迅速，生死事大。", source:"禪門警語", tag:"無常" },
  { text:"知足常樂，能忍自安。", source:"佛門常語", tag:"無常" },
  { text:"忍辱第一道，佛說無為最。", source:"《佛遺教經》", tag:"無常" },

  { text:"給人信心，給人歡喜，給人希望，給人方便。", source:"星雲大師", tag:"感恩" },
  { text:"但行好事，莫問前程。", source:"古德法語", tag:"感恩" },
  { text:"一日之所需，百工斯為備，當常思報恩。", source:"印光大師", tag:"感恩" },
  { text:"隨緣不變，不變隨緣。", source:"佛門常語", tag:"感恩" }
];

const tube = document.getElementById('tube');
const card = document.getElementById('card');
const cardInner = document.getElementById('cardInner');
const btn = document.getElementById('drawBtn');
const sticks = tube.querySelectorAll('.stick');
let drawing = false;

function draw() {
  if (drawing) return;
  drawing = true;
  btn.disabled = true;
  card.classList.remove('show');

  sticks.forEach(s => s.classList.remove('flying'));
  tube.classList.remove('shaking');
  void tube.offsetWidth;
  tube.classList.add('shaking');

  setTimeout(() => {
    const flyer = sticks[Math.floor(Math.random() * sticks.length)];
    flyer.classList.add('flying');

    setTimeout(() => {
      const q = quotes[Math.floor(Math.random() * quotes.length)];
      cardInner.innerHTML =
        '<span class="tag">' + q.tag + '</span>' +
        '<span class="quote">「' + q.text + '」</span>' +
        '<span class="source">—— ' + q.source + '</span>';
      card.classList.add('show');
      flyer.classList.remove('flying');
      btn.textContent = '再　　抽';
      btn.disabled = false;
      drawing = false;
    }, 550);
  }, 600);
}

btn.addEventListener('click', draw);
</script>

</body>
</html>
