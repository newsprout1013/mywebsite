<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#14263f">
<link rel="manifest" href="choujian-manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>佛法法語抽籤</title>
<style>
:root {
  --indigo:#1f3a5f; --indigo-deep:#14263f;
  --gold:#c9a227; --gold-light:#f0dfa0; --gold-deep:#8f6c17;
  --cream:#f7f1e3; --paper:#fffdf7;
  --ink:#24201a; --muted:#6d6455;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background:var(--cream); color:var(--ink);
  font-family:"Noto Serif TC","Source Han Serif TC","PingFang TC","微軟正黑體",serif;
  font-size:21px; line-height:1.9;
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center;
  padding-bottom:3rem;
  overflow-x:hidden;
}

/* ── Header ── */
header {
  width:100%;
  background:linear-gradient(180deg, var(--indigo) 0%, var(--indigo-deep) 100%);
  text-align:center;
  padding:2rem 1rem 1.7rem;
  border-bottom:5px solid var(--gold);
  box-shadow:0 3px 12px rgba(0,0,0,.3);
}
header h1 {
  font-size:2rem; font-weight:900; letter-spacing:.22em; text-indent:.22em;
  line-height:1.6;
  color:#fdf3d8;
  text-shadow:0 1px 3px rgba(0,0,0,.5);
}
header p {
  margin-top:.4rem; font-size:1.05rem; letter-spacing:.18em; text-indent:.18em;
  line-height:1.8; color:var(--gold-light); opacity:.92;
}

/* ── Main ── */
main {
  width:100%; max-width:560px;
  padding:1.8rem 1.2rem 0;
  display:flex; flex-direction:column; align-items:center;
  gap:1.6rem;
}

/* 步驟提示 */
.step-hint {
  font-size:1.1rem; color:var(--muted); letter-spacing:.12em;
  text-align:center; line-height:1.9;
}

/* ── 籤筒 ── */
.tube-wrap { width:170px; height:190px; position:relative; flex-shrink:0; }
.tube-inner { position:absolute; inset:0; transform-origin:50% 90%; }
.tube-wrap.shaking .tube-inner { animation:shake 1s ease-in-out; }
@keyframes shake {
  0%,100% { transform:rotate(0deg); }
  10% { transform:rotate(-7deg); }
  20% { transform:rotate(7deg); }
  30% { transform:rotate(-8deg); }
  40% { transform:rotate(8deg); }
  50% { transform:rotate(-6deg); }
  60% { transform:rotate(6deg); }
  70% { transform:rotate(-4deg); }
  80% { transform:rotate(4deg); }
  90% { transform:rotate(-2deg); }
}
.tube-body {
  position:absolute; bottom:0; left:20px; right:20px; height:112px;
  background:linear-gradient(180deg, var(--indigo) 0%, var(--indigo-deep) 100%);
  border:3px solid var(--gold); border-radius:12px 12px 24px 24px;
  box-shadow:inset 0 8px 14px rgba(0,0,0,.35), 0 6px 12px rgba(0,0,0,.25);
}
.tube-body::after {
  content:'籤'; position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-size:2rem; color:var(--gold-light); opacity:.9;
  font-family:inherit;
}
.tube-rim {
  position:absolute; bottom:104px; left:14px; right:14px; height:16px;
  background:linear-gradient(180deg, var(--gold-light), var(--gold));
  border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,.3);
}
.stick {
  position:absolute; bottom:110px; width:9px; height:74px;
  border-radius:3px 3px 0 0;
  background:linear-gradient(180deg, var(--gold-light) 0%, var(--gold-deep) 100%);
  box-shadow:0 2px 3px rgba(0,0,0,.2);
  transform-origin:bottom center;
}
.stick::after {
  content:''; position:absolute; top:-6px; left:-1.5px; width:12px; height:12px;
  border-radius:50%; background:#a4283a; box-shadow:0 0 0 2px var(--gold-light);
}
.stick.s1 { left:42px; height:78px; transform:rotate(-9deg); }
.stick.s2 { left:62px; height:88px; transform:rotate(-3deg); }
.stick.s3 { left:83px; height:94px; transform:rotate(2deg); }
.stick.s4 { left:104px; height:84px; transform:rotate(7deg); }
.stick.s5 { left:122px; height:72px; transform:rotate(12deg); }
.tube-wrap.shaking .stick { animation:rattle .25s ease-in-out 4; }
@keyframes rattle {
  0%,100% { margin-bottom:0; }
  50% { margin-bottom:7px; }
}
.stick.flying { animation:flyOut .7s cubic-bezier(.3,.6,.4,1) forwards; }
@keyframes flyOut {
  0% { opacity:1; }
  55% { opacity:1; }
  100% { transform:translateY(-170px) rotate(24deg); opacity:0; }
}

/* ── 結果區（光暈 + 卡片） ── */
.reveal-zone { position:relative; width:100%; display:flex; justify-content:center; }
.glow {
  position:absolute; top:50%; left:50%; width:340px; height:340px;
  transform:translate(-50%,-50%) scale(.3);
  border-radius:50%;
  background:radial-gradient(circle, rgba(240,223,160,.85) 0%, rgba(240,223,160,0) 65%);
  opacity:0; pointer-events:none;
}
.glow.burst { animation:burst 1s ease-out; }
@keyframes burst {
  0% { opacity:0; transform:translate(-50%,-50%) scale(.3); }
  35% { opacity:1; }
  100% { opacity:0; transform:translate(-50%,-50%) scale(1.5); }
}

.result-card {
  position:relative;
  width:100%; min-height:250px;
  background:var(--paper);
  border:3px solid var(--gold);
  outline:1px solid var(--gold-light);
  outline-offset:6px;
  border-radius:14px;
  padding:2.2rem 1.6rem;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center;
}
.result-card.show { animation:popIn .65s cubic-bezier(.2,1.4,.4,1); }
@keyframes popIn {
  0% { opacity:0; transform:translateY(26px) scale(.92); }
  100% { opacity:1; transform:translateY(0) scale(1); }
}

.hint-text { color:var(--muted); font-size:1.15rem; letter-spacing:.12em; line-height:2.1; }

/* 卡片內容：一律各自成行、置中、留距 */
.tag {
  display:block; width:fit-content; margin:0 auto 1.2rem;
  background:var(--indigo); color:var(--gold-light);
  font-size:1.05rem; letter-spacing:.35em; text-indent:.35em;
  padding:.4rem 1.2rem; border-radius:999px; font-family:sans-serif;
  line-height:1.6;
}
.quote {
  display:block;
  font-size:1.65rem; font-weight:700; color:var(--ink);
  line-height:2.1; letter-spacing:.04em;
  margin-bottom:1.2rem;
}
.source {
  display:block;
  font-size:1.15rem; color:var(--indigo); letter-spacing:.1em; line-height:1.8;
}

/* ── 按鈕 ── */
.btn {
  width:100%; max-width:340px;
  font-family:inherit; font-size:1.55rem; font-weight:900; letter-spacing:.4em; text-indent:.4em;
  background:linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 55%, var(--gold-deep) 100%);
  color:var(--indigo-deep);
  border:2px solid var(--gold-deep);
  border-radius:14px;
  padding:1.15rem 1rem;
  line-height:1.6;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,.25);
  transition:transform .12s, box-shadow .12s;
  animation:breathe 2.6s ease-in-out infinite;
}
@keyframes breathe {
  0%,100% { box-shadow:0 4px 10px rgba(0,0,0,.25), 0 0 0 0 rgba(201,162,39,.45); }
  50% { box-shadow:0 4px 10px rgba(0,0,0,.25), 0 0 0 14px rgba(201,162,39,0); }
}
.btn:active { transform:translateY(2px) scale(.97); }
.btn:disabled { opacity:.7; animation:none; }

footer {
  margin-top:.4rem; padding:0 1.5rem;
  font-size:1rem; color:var(--muted); letter-spacing:.08em; text-align:center; line-height:1.9;
}

@media (prefers-reduced-motion: reduce) {
  .tube-wrap.shaking .tube-inner, .tube-wrap.shaking .stick,
  .stick.flying, .result-card.show, .glow.burst, .btn { animation:none !important; }
}
</style>
</head>
<body>

<header>
  <h1>佛法法語抽籤</h1>
  <p>誠心一抽　靜心觀照</p>
</header>

<main>
  <p class="step-hint">合掌靜心，默念所求<br>準備好了，請按下方金色按鈕</p>

  <div class="tube-wrap" id="tube">
    <div class="tube-inner">
      <div class="stick s1"></div>
      <div class="stick s2"></div>
      <div class="stick s3"></div>
      <div class="stick s4"></div>
      <div class="stick s5"></div>
      <div class="tube-rim"></div>
      <div class="tube-body"></div>
    </div>
  </div>

  <div class="reveal-zone">
    <div class="glow" id="glow"></div>
    <div class="result-card" id="card">
      <div id="cardInner">
        <p class="hint-text">法語將在此顯現</p>
      </div>
    </div>
  </div>

  <button class="btn" id="drawBtn">抽　籤</button>

  <footer>法語隨緣而得，僅供靜心參考，不作占卜之用</footer>
</main>

<script>
const quotes = [
  { text:"一切有為法，如夢幻泡影，如露亦如電，應作如是觀。", source:"《金剛經》", tag:"智慧" },
  { text:"應無所住而生其心。", source:"《金剛經》", tag:"智慧" },
  { text:"色即是空，空即是色。", source:"《心經》", tag:"智慧" },
  { text:"不生不滅，不垢不淨，不增不減。", source:"《心經》", tag:"智慧" },
  { text:"若人欲了知，三世一切佛，應觀法界性，一切唯心造。", source:"《華嚴經》", tag:"智慧" },
  { text:"千江有水千江月，萬里無雲萬里天。", source:"古德法語", tag:"智慧" },
  { text:"一花一世界，一葉一如來。", source:"禪語", tag:"智慧" },

  { text:"大慈大悲愍眾生，大喜大捨濟含識。", source:"《大悲心陀羅尼》", tag:"慈悲" },
  { text:"慈悲沒有敵人，智慧不起煩惱。", source:"星雲大師", tag:"慈悲" },
  { text:"但願眾生得離苦，不為自己求安樂。", source:"《華嚴經》", tag:"慈悲" },
  { text:"愛出者愛返，福往者福來。", source:"古德法語", tag:"慈悲" },
  { text:"未成佛道，先結人緣。", source:"印光大師", tag:"慈悲" },

  { text:"諸法因緣生，諸法因緣滅。", source:"佛門常語", tag:"因果" },
  { text:"欲知前世因，今生受者是；欲知來世果，今生作者是。", source:"《三世因果經》", tag:"因果" },
  { text:"因上努力，果上隨緣。", source:"佛門常語", tag:"因果" },
  { text:"種瓜得瓜，種豆得豆。", source:"古德法語", tag:"因果" },

  { text:"放下屠刀，立地成佛。", source:"禪語", tag:"放下" },
  { text:"菩提本無樹，明鏡亦非台，本來無一物，何處惹塵埃。", source:"六祖惠能", tag:"放下" },
  { text:"煩惱即菩提。", source:"禪語", tag:"放下" },
  { text:"時時勤拂拭，勿使惹塵埃。", source:"神秀禪師", tag:"放下" },
  { text:"一念放下，萬般自在。", source:"古德法語", tag:"放下" },

  { text:"是日已過，命亦隨減，如少水魚，斯有何樂？大眾當勤精進，如救頭燃，但念無常，慎勿放逸。", source:"普賢警眾偈", tag:"精進" },
  { text:"修行是點滴功夫，不在一時。", source:"古德法語", tag:"精進" },
  { text:"人身難得，佛法難聞，此身不向今生度，更向何生度此身。", source:"《勸發菩提心文》", tag:"精進" },
  { text:"有佛法就有辦法。", source:"星雲大師", tag:"精進" },

  { text:"心平何勞持戒，行直何用參禪。", source:"六祖惠能", tag:"清淨" },
  { text:"心淨則國土淨。", source:"《維摩詰經》", tag:"清淨" },
  { text:"心是根，法是塵，兩種猶如鏡上痕，痕垢盡除光始現，心法雙忘性即真。", source:"禪語", tag:"清淨" },
  { text:"諸惡莫作，眾善奉行，自淨其意，是諸佛教。", source:"七佛通戒偈", tag:"清淨" },

  { text:"凡所有相，皆是虛妄，若見諸相非相，即見如來。", source:"《金剛經》", tag:"無常" },
  { text:"無常迅速，生死事大。", source:"禪門警語", tag:"無常" },
  { text:"知足常樂，能忍自安。", source:"佛門常語", tag:"無常" },
  { text:"忍辱第一道，佛說無為最。", source:"《佛遺教經》", tag:"無常" },

  { text:"給人信心，給人歡喜，給人希望，給人方便。", source:"星雲大師", tag:"感恩" },
  { text:"但行好事，莫問前程。", source:"古德法語", tag:"感恩" },
  { text:"一日之所需，百工斯為備，當常思報恩。", source:"印光大師", tag:"感恩" },
  { text:"隨緣不變，不變隨緣。", source:"佛門常語", tag:"感恩" }
];

const tube = document.getElementById('tube');
const card = document.getElementById('card');
const cardInner = document.getElementById('cardInner');
const glow = document.getElementById('glow');
const btn = document.getElementById('drawBtn');
const sticks = tube.querySelectorAll('.stick');
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
let drawing = false;

function reveal() {
  const q = quotes[Math.floor(Math.random() * quotes.length)];
  cardInner.innerHTML =
    '<span class="tag">' + q.tag + '</span>' +
    '<span class="quote">「' + q.text + '」</span>' +
    '<span class="source">—— ' + q.source + '</span>';
  card.classList.add('show');
  glow.classList.add('burst');
  btn.textContent = '再　抽';
  btn.disabled = false;
  drawing = false;
  card.scrollIntoView({ behavior: reduceMotion ? 'auto' : 'smooth', block: 'center' });
}

function draw() {
  if (drawing) return;
  drawing = true;
  btn.disabled = true;
  card.classList.remove('show');
  glow.classList.remove('burst');
  sticks.forEach(s => s.classList.remove('flying'));
  tube.classList.remove('shaking');
  void tube.offsetWidth;

  if (reduceMotion) { reveal(); return; }

  tube.classList.add('shaking');
  setTimeout(() => {
    const flyer = sticks[Math.floor(Math.random() * sticks.length)];
    flyer.classList.add('flying');
    setTimeout(() => {
      flyer.classList.remove('flying');
      reveal();
    }, 650);
  }, 950);
}

btn.addEventListener('click', draw);
</script>

</body>
</html>
