<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3d2b18">
<link rel="manifest" href="choujian-manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>佛法法語抽籤</title>
<style>
:root {
  --bronze:#4a3220; --bronze-deep:#2e1f14;
  --gold:#b8892c; --gold-light:#e9d29b;
  --cream:#fbf3e2; --paper:#fffbf1;
  --ink:#2a1a0e; --muted:#7a6650;
}
* { box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; }
body {
  background:var(--cream); color:var(--ink);
  font-family:"Noto Serif TC","Source Han Serif TC","PingFang TC","微軟正黑體",serif;
  font-size:20px; line-height:2;
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center;
  padding-bottom:3rem;
}

/* ── Header ── */
header {
  width:100%;
  background:linear-gradient(180deg, var(--bronze) 0%, var(--bronze-deep) 100%);
  color:var(--gold-light);
  text-align:center;
  padding:2.2rem 1.5rem 1.8rem;
  border-bottom:6px solid var(--gold);
  box-shadow:0 3px 10px rgba(0,0,0,.25);
}
header h1 {
  font-size:2.1rem; font-weight:900; letter-spacing:.25em;
  color:#fdf3d8;
  text-shadow:0 1px 2px rgba(0,0,0,.4);
}
header p {
  margin-top:.7rem; font-size:1.05rem; letter-spacing:.2em; color:var(--gold-light); opacity:.9;
}

/* ── Main ── */
main {
  width:100%; max-width:560px;
  padding:2rem 1.3rem 0;
  display:flex; flex-direction:column; align-items:center;
  gap:2rem;
}

.ornament { font-size:1.3rem; color:var(--gold); letter-spacing:1.2em; text-indent:1.2em; }

.card {
  width:100%; min-height:280px;
  background:var(--paper);
  border:3px solid var(--gold);
  outline:1px solid var(--gold-light);
  outline-offset:6px;
  border-radius:10px;
  padding:2.6rem 1.8rem;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; gap:1.1rem;
  transition:opacity .25s ease;
}
.card.fade { opacity:0; }

.card .hint-text {
  color:var(--muted); font-size:1.15rem; letter-spacing:.15em; line-height:2.1;
}

.tag {
  display:inline-block; background:var(--bronze); color:var(--gold-light);
  font-size:1rem; letter-spacing:.3em; text-indent:.3em;
  padding:.35rem 1rem; border-radius:999px; font-family:sans-serif;
}

.quote {
  font-size:1.6rem; font-weight:700; color:var(--ink);
  line-height:2.15; letter-spacing:.06em;
}

.source {
  font-size:1.15rem; color:var(--bronze); letter-spacing:.12em;
}

/* ── Buttons ── */
.btn-group { width:100%; display:flex; flex-direction:column; align-items:center; gap:1rem; }
.btn {
  width:100%; max-width:340px;
  font-family:inherit; font-size:1.5rem; font-weight:700; letter-spacing:.5em; text-indent:.5em;
  background:var(--bronze); color:#fdf3d8;
  border:2px solid var(--gold);
  border-radius:10px;
  padding:1.1rem 1rem;
  cursor:pointer;
  box-shadow:0 3px 8px rgba(0,0,0,.25);
}
.btn:active { transform:translateY(2px); box-shadow:0 1px 4px rgba(0,0,0,.25); }

.btn-quiet {
  background:transparent; color:var(--bronze);
  border:2px solid var(--gold-light);
  font-size:1.15rem; font-weight:700; letter-spacing:.2em; text-indent:.2em;
  padding:.75rem 1rem;
}

footer {
  margin-top:1rem; padding:0 1.5rem;
  font-size:1rem; color:var(--muted); letter-spacing:.1em; text-align:center; line-height:1.9;
}
</style>
</head>
<body>

<header>
  <h1>佛 法 法 語</h1>
  <p>誠 心 抽 籤 ‧ 靜 心 觀 照</p>
</header>

<main>
  <div class="ornament">◆ ❖ ◆</div>

  <div class="card" id="card">
    <div class="hint-text" id="cardInner">合掌　靜心　默念所求<br>準備好了，請點下方「抽籤」</div>
  </div>

  <div class="btn-group">
    <button class="btn" id="drawBtn">抽　　籤</button>
  </div>

  <footer>法語隨緣而得，僅供靜心參考，不作占卜之用</footer>
</main>

<script>
const quotes = [
  { text:"一切有為法，如夢幻泡影，如露亦如電，應作如是觀。", source:"《金剛經》", tag:"智慧" },
  { text:"應無所住而生其心。", source:"《金剛經》", tag:"智慧" },
  { text:"色即是空，空即是色。", source:"《心經》", tag:"智慧" },
  { text:"不生不滅，不垢不淨，不增不減。", source:"《心經》", tag:"智慧" },
  { text:"若人欲了知，三世一切佛，應觀法界性，一切唯心造。", source:"《華嚴經》", tag:"智慧" },
  { text:"千江有水千江月，萬里無雲萬里天。", source:"古德法語", tag:"智慧" },
  { text:"一花一世界，一葉一如來。", source:"禪語", tag:"智慧" },

  { text:"大慈大悲愍眾生，大喜大捨濟含識。", source:"《大悲心陀羅尼》", tag:"慈悲" },
  { text:"慈悲沒有敵人，智慧不起煩惱。", source:"星雲大師", tag:"慈悲" },
  { text:"但願眾生得離苦，不為自己求安樂。", source:"《華嚴經》", tag:"慈悲" },
  { text:"愛出者愛返，福往者福來。", source:"古德法語", tag:"慈悲" },
  { text:"未成佛道，先結人緣。", source:"印光大師", tag:"慈悲" },

  { text:"諸法因緣生，諸法因緣滅。", source:"佛門常語", tag:"因果" },
  { text:"欲知前世因，今生受者是；欲知來世果，今生作者是。", source:"《三世因果經》", tag:"因果" },
  { text:"因上努力，果上隨緣。", source:"佛門常語", tag:"因果" },
  { text:"種瓜得瓜，種豆得豆。", source:"古德法語", tag:"因果" },

  { text:"放下屠刀，立地成佛。", source:"禪語", tag:"放下" },
  { text:"菩提本無樹，明鏡亦非台，本來無一物，何處惹塵埃。", source:"六祖惠能", tag:"放下" },
  { text:"煩惱即菩提。", source:"禪語", tag:"放下" },
  { text:"時時勤拂拭，勿使惹塵埃。", source:"神秀禪師", tag:"放下" },
  { text:"一念放下，萬般自在。", source:"古德法語", tag:"放下" },

  { text:"是日已過，命亦隨減，如少水魚，斯有何樂？大眾當勤精進，如救頭燃，但念無常，慎勿放逸。", source:"普賢警眾偈", tag:"精進" },
  { text:"修行是點滴功夫，不在一時。", source:"古德法語", tag:"精進" },
  { text:"人身難得，佛法難聞，此身不向今生度，更向何生度此身。", source:"《勸發菩提心文》", tag:"精進" },
  { text:"有佛法就有辦法。", source:"星雲大師", tag:"精進" },

  { text:"心平何勞持戒，行直何用參禪。", source:"六祖惠能", tag:"清淨" },
  { text:"心淨則國土淨。", source:"《維摩詰經》", tag:"清淨" },
  { text:"心是根，法是塵，兩種猶如鏡上痕，痕垢盡除光始現，心法雙忘性即真。", source:"禪語", tag:"清淨" },
  { text:"諸惡莫作，眾善奉行，自淨其意，是諸佛教。", source:"七佛通戒偈", tag:"清淨" },

  { text:"凡所有相，皆是虛妄，若見諸相非相，即見如來。", source:"《金剛經》", tag:"無常" },
  { text:"無常迅速，生死事大。", source:"禪門警語", tag:"無常" },
  { text:"知足常樂，能忍自安。", source:"佛門常語", tag:"無常" },
  { text:"忍辱第一道，佛說無為最。", source:"《佛遺教經》", tag:"無常" },

  { text:"給人信心，給人歡喜，給人希望，給人方便。", source:"星雲大師", tag:"感恩" },
  { text:"但行好事，莫問前程。", source:"古德法語", tag:"感恩" },
  { text:"一日之所需，百工斯為備，當常思報恩。", source:"印光大師", tag:"感恩" },
  { text:"隨緣不變，不變隨緣。", source:"佛門常語", tag:"感恩" }
];

const card = document.getElementById('card');
const cardInner = document.getElementById('cardInner');
const btn = document.getElementById('drawBtn');

function draw() {
  card.classList.add('fade');
  btn.textContent = '再　　抽';
  setTimeout(() => {
    const q = quotes[Math.floor(Math.random() * quotes.length)];
    cardInner.innerHTML =
      '<span class="tag">' + q.tag + '</span>' +
      '<span class="quote">「' + q.text + '」</span>' +
      '<span class="source">—— ' + q.source + '</span>';
    card.classList.remove('fade');
  }, 220);
}

btn.addEventListener('click', draw);
</script>

</body>
</html>
