<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>千手眼大悲心咒行法・修持</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="大悲心咒行法">
<meta name="theme-color" content="#3d2b0e">
<style>
:root{
  --ink:#1a1108; --paper:#faf7f2; --dark:#3d2b0e;
  --red:#8b3a1e; --redfg:#faf7f2; --muted:#6b5740;
  --notebg:#f0e8d8; --rule:#c8b89a;
  /* font scale: 0=標準 1=大 2=特大 */
  --fs: 1.05rem;
  --fs-sm: .82rem;
  --fs-xs: .72rem;
  --fs-chant: 1rem;
  --fs-menu: .95rem;
  --lh: 2.2;
}
body.fs-s {
  --fs: 0.9rem;
  --fs-sm: .75rem;
  --fs-xs: .65rem;
  --fs-chant: 0.88rem;
  --fs-menu: 0.85rem;
  --lh: 2.1;
}
body.fs-large {
  --fs: 1.25rem;
  --fs-sm: .96rem;
  --fs-xs: .84rem;
  --fs-chant: 1.18rem;
  --fs-menu: 1.1rem;
  --lh: 2.3;
}
body.fs-xlarge {
  --fs: 1.48rem;
  --fs-sm: 1.12rem;
  --fs-xs: .95rem;
  --fs-chant: 1.38rem;
  --fs-menu: 1.25rem;
  --lh: 2.4;
}
body.fs-xxlarge {
  --fs: 1.72rem;
  --fs-sm: 1.28rem;
  --fs-xs: 1.05rem;
  --fs-chant: 1.58rem;
  --fs-menu: 1.42rem;
  --lh: 2.5;
}
body.fs-3xl {
  --fs: 2.0rem;
  --fs-sm: 1.48rem;
  --fs-xs: 1.2rem;
  --fs-chant: 1.82rem;
  --fs-menu: 1.6rem;
  --lh: 2.6;
}
body.fs-4xl {
  --fs: 2.3rem;
  --fs-sm: 1.7rem;
  --fs-xs: 1.38rem;
  --fs-chant: 2.1rem;
  --fs-menu: 1.82rem;
  --lh: 2.7;
}
body.fs-5xl {
  --fs: 2.6rem;
  --fs-sm: 1.92rem;
  --fs-xs: 1.55rem;
  --fs-chant: 2.38rem;
  --fs-menu: 2.05rem;
  --lh: 2.8;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--paper);}
body{font-family:"Noto Serif TC","Source Han Serif TC","宋體",Georgia,serif;color:var(--ink);}

/* ── TOP BAR ── */
#topbar{
  position:fixed;top:0;left:0;right:0;height:52px;
  background:var(--dark);color:var(--redfg);
  display:flex;align-items:center;padding:0 1rem;gap:.75rem;z-index:100;
}
#section-label{font-size:.85rem;letter-spacing:.12em;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#progress-wrap{flex:0 0 80px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;}
#progress-bar{height:100%;background:var(--redfg);border-radius:2px;transition:width .3s;}
#menu-btn{background:none;border:none;color:var(--redfg);font-size:1.3rem;cursor:pointer;padding:.25rem;flex-shrink:0;}
#step-counter{font-size:.72rem;opacity:.7;flex-shrink:0;}
#fs-btns{display:flex;gap:2px;flex-shrink:0;}
.fs-btn{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);
  color:var(--redfg);font-size:.72rem;font-family:sans-serif;
  padding:.1rem .35rem;border-radius:2px;cursor:pointer;line-height:1.6;
}
.fs-btn:active{background:rgba(255,255,255,.28);}
.fs-btn:disabled{opacity:.3;cursor:default;}

/* ── SLIDE AREA ── */
#slide-area{
  position:fixed;top:52px;bottom:72px;left:0;right:0;
  overflow:hidden;
}
.slide{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  transition:transform .28s cubic-bezier(.4,0,.2,1),opacity .2s;
}
.slide.hr{transform:translateX(100%);opacity:0;pointer-events:none;}
.slide.hl{transform:translateX(-100%);opacity:0;pointer-events:none;}

/* ── SLIDE CONTENT ── */
.slide-inner{
  flex:1;overflow-y:auto;
  padding:1.2rem 1.4rem 1rem;
  -webkit-overflow-scrolling:touch;
  font-size:var(--fs);line-height:var(--lh);
  scrollbar-width:none;
}
.slide-inner::-webkit-scrollbar{width:0;}

/* section label inside slide */
.slide-sec{
  font-size:var(--fs-xs);color:var(--muted);letter-spacing:.14em;
  margin-bottom:.7rem;font-family:sans-serif;
}

/* ── INLINE ACTION BADGE ── */
/* sits inside running text */
.ab{
  display:inline-block;
  font-family:sans-serif;font-size:var(--fs-sm);font-weight:700;
  letter-spacing:.05em;
  padding:.05rem .4rem;
  border-radius:3px;
  vertical-align:middle;
  margin:0 .18rem;
  color:var(--redfg);
  white-space:nowrap;
  line-height:2;
}
.ab-bow  {background:#8b3a1e;}
.ab-rise {background:#2b4a1e;}
.ab-chant{background:#1a2e4a;}
.ab-kneel{background:#4a3010;}
.ab-info {background:#5a5040;}
.ab-walk {background:#2a3d2a;}

/* ── COVER SLIDE ── */
.slide-cover {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  background: #f7f3ec;
  position: relative;
  overflow: hidden;
}
.cover-top-bar {
  height: 8px;
  background: #6b3a1e;
  flex-shrink: 0;
}
.cover-inner {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2.5rem 2.2rem 1.5rem;
  gap: 0;
}
.cover-en {
  font-size: .68rem;
  letter-spacing: .08em;
  color: #9a8870;
  text-align: center;
  font-family: "Georgia", serif;
  font-style: italic;
  margin-bottom: 1.2rem;
}
.cover-divider-thin {
  width: 100%;
  height: 1px;
  background: #c5b49a;
  margin: .9rem 0;
}
.cover-title-wrap {
  padding: 1.4rem 0;
  text-align: center;
}
.cover-title {
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: .2em;
  color: #2a1a08;
  font-family: "Noto Serif TC","Source Han Serif TC","宋體",Georgia,serif;
  line-height: 1.6;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .3rem;
}
.cover-title-sub {
  font-size: 1.3rem;
  letter-spacing: .45em;
  color: #5a4530;
  font-weight: 700;
  padding-left: .45em;
}
.cover-author {
  font-size: .88rem;
  letter-spacing: .28em;
  color: #5a4530;
  font-family: "Noto Serif TC","宋體",serif;
  margin-top: .55rem;
  text-align: center;
}
.cover-bottom-ornament {
  flex-shrink: 0;
  padding: 0 2.2rem 1.4rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .55rem;
}
.cover-bottom-line {
  width: 100%;
  height: 1px;
  background: #c5b49a;
}
.cover-org {
  font-size: .72rem;
  letter-spacing: .18em;
  color: #9a8870;
  font-family: "Noto Serif TC","宋體",serif;
  text-align: center;
}

/* ── ACCORDION (Q&A) ── */
.qa-wrap{
  flex:1;overflow-y:auto;
  padding:.8rem 1rem 1rem;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.qa-wrap::-webkit-scrollbar{width:0;}
.qa-item{
  border-bottom:1px solid var(--rule);
}
.qa-q{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:.6rem;
  padding:.85rem .2rem;
  cursor:pointer;
  font-size:var(--fs);
  font-family:"Noto Serif TC","宋體",Georgia,serif;
  color:var(--ink);
  line-height:1.6;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.qa-q:active{color:var(--red);}
.qa-arrow{
  flex-shrink:0;
  font-size:.9rem;
  color:var(--muted);
  margin-top:.15rem;
  transition:transform .22s;
}
.qa-item.open .qa-arrow{transform:rotate(90deg);}
.qa-item.open .qa-q{color:var(--red);}
.qa-a{
  display:none;
  padding:.1rem .2rem 1rem;
  font-size:var(--fs-sm);
  color:var(--muted);
  line-height:1.9;
  border-left:2px solid var(--red);
  padding-left:.8rem;
  margin-left:.1rem;
}
.qa-item.open .qa-a{display:block;}

/* ── NOTE ── */
.note{
  font-size:var(--fs-sm);color:var(--muted);
  border-left:2px solid var(--rule);
  padding-left:.75rem;margin:.6rem 0;line-height:1.7;
}

/* ── CHANT BLOCK ── */
.chant-wrap{
  background:var(--notebg);border:1px solid var(--rule);
  border-radius:6px;padding:.8rem 1rem;margin:.5rem 0;
  font-size:var(--fs-chant);line-height:2.1;
}
.chant-lbl{font-size:var(--fs-xs);color:var(--muted);letter-spacing:.12em;margin-bottom:.4rem;font-family:sans-serif;}

/* ── VERSE ── */
.verse{margin:.3rem 0 .3rem 0;}
.vrow{display:flex;gap:.8rem;line-height:2.1;font-size:var(--fs);}
.vc{color:var(--muted);flex:0 0 6.5em;}
.vr{color:var(--ink);}

/* ── TAP HINT ── */
.tap-hint{
  flex-shrink:0;
  text-align:center;font-size:.78rem;color:var(--muted);
  letter-spacing:.1em;padding:.45rem 0;
  border-top:1px solid var(--rule);
  background:var(--paper);
}

/* ── SCROLL-MORE HINT (下方還有經文) ── */
.scroll-more{
  position:absolute;left:0;right:0;
  height:3.4rem;pointer-events:none;z-index:5;
  background:linear-gradient(to top, var(--paper) 14%, rgba(250,247,242,0));
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;transition:opacity .22s;
}
.slide.has-more .scroll-more{opacity:1;}
.scroll-more-pill{
  font-family:sans-serif;font-size:.74rem;letter-spacing:.08em;
  color:var(--redfg);background:var(--red);
  padding:.18rem .8rem;border-radius:999px;margin-bottom:.35rem;
  box-shadow:0 1px 5px rgba(0,0,0,.22);
  animation:bobMore 1.4s ease-in-out infinite;
}
@keyframes bobMore{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}

/* ── PER-PAGE READING PROGRESS ── */
#page-progress{
  position:fixed;top:52px;bottom:72px;right:0;width:3px;
  background:rgba(0,0,0,.05);z-index:90;display:none;
}
#page-progress-fill{
  position:absolute;top:0;left:0;width:100%;height:0;
  background:var(--red);transition:height .08s linear;
}

/* 讀到底 / 短頁面 → 「繼續」變醒目，明確告訴使用者「這頁可以走了」 */
#center-tap.ready{color:var(--red);font-weight:700;}
.slide.read-done .tap-hint{color:var(--red);font-weight:700;}

/* ── BOTTOM NAV ── */
#bottomnav{
  position:fixed;bottom:0;left:0;right:0;height:72px;
  background:var(--paper);border-top:1px solid var(--rule);
  display:flex;align-items:center;
}
#btn-prev,#btn-next{
  height:100%;border:none;background:none;cursor:pointer;
  color:var(--dark);font-size:1.3rem;padding:0 .6rem;flex-shrink:0;
  width:40px;
}
#btn-prev:disabled,#btn-next:disabled{color:var(--rule);}
#center-tap{
  flex:1;height:100%;border:none;background:none;cursor:pointer;
  font-size:1rem;color:var(--muted);letter-spacing:.1em;
  display:flex;align-items:center;justify-content:center;gap:.4rem;
}
#center-tap:active,#btn-prev:active,#btn-next:active{background:var(--notebg);}

/* ── 拜懺模式 ── */
#prostrate-btn{
  font-size:.62rem;padding:.15rem .45rem;border-radius:2px;
  background:rgba(255,255,255,.15);color:rgba(255,255,255,.75);
  font-family:sans-serif;flex-shrink:0;cursor:pointer;
  border:1px solid rgba(255,255,255,.25);
  user-select:none;
}
#prostrate-btn.on{background:rgba(255,180,60,.35);color:#fff;border-color:rgba(255,180,60,.6);}
body.prostrate #slide-area{-webkit-tap-highlight-color:transparent;}

/* ── MENU ── */
#menu-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;
  display:none;align-items:flex-start;justify-content:flex-end;
}
#menu-overlay.open{display:flex;}
#menu-panel{
  background:var(--paper);width:78vw;max-width:320px;height:100%;
  overflow-y:auto;padding:1rem 0 2rem;box-shadow:-4px 0 16px rgba(0,0,0,.2);
}
.menu-title{font-size:.78rem;color:var(--muted);letter-spacing:.15em;padding:.5rem 1.2rem;border-bottom:1px solid var(--rule);margin-bottom:.4rem;}
.menu-item{
  display:block;width:100%;text-align:left;background:none;border:none;
  padding:.7rem 1.2rem;font-size:var(--fs-menu);font-family:inherit;color:var(--ink);
  cursor:pointer;border-bottom:1px solid var(--notebg);letter-spacing:.05em;
}
.menu-item:active,.menu-item.active{background:var(--notebg);}
.menu-num{
  display:inline-block;background:var(--dark);color:var(--redfg);
  font-size:.68rem;padding:.08rem .35rem;border-radius:2px;margin-right:.5rem;font-family:sans-serif;
}

/* wakelock */
#wl{
  font-size:.62rem;padding:.15rem .45rem;border-radius:2px;
  background:rgba(255,255,255,.15);color:rgba(255,255,255,.75);
  font-family:sans-serif;flex-shrink:0;cursor:pointer;
  border:1px solid rgba(255,255,255,.25);
  user-select:none;
}
</style>
</head>
<body>

<div id="topbar">
  <button id="menu-btn" onclick="toggleMenu()">☰</button>
  <span id="section-label"></span>
  <span id="step-counter"></span>
  <div id="progress-wrap"><div id="progress-bar"></div></div>
  <div id="fs-btns">
    <button class="fs-btn" onclick="setFs(-1)" id="fs-down">A⁻</button>
    <button class="fs-btn" onclick="setFs(1)"  id="fs-up">A⁺</button>
  </div>
  <span id="prostrate-btn" onclick="toggleProstrate()" title="拜懺模式：點任意處翻頁">🙏 拜懺</span>
  <span id="wl" onclick="toggleWakeLock()" title="點擊切換螢幕常亮">💡</span>
</div>

<div id="slide-area"></div>
<div id="page-progress"><div id="page-progress-fill"></div></div>

<div id="bottomnav">
  <button id="btn-prev" onclick="go(-1)">‹</button>
  <button id="center-tap" onclick="smartContinue()">點此繼續 ›</button>
  <button id="btn-next" onclick="go(1)">›</button>
</div>

<div id="menu-overlay" onclick="if(event.target===this)closeMenu()">
  <div id="menu-panel">
    <div class="menu-title">跳至儀軌</div>
  </div>
</div>

<script>
// 行內動作標籤的快捷函式
const bow   = t => `<span class="ab ab-bow">拜↓</span>${t?'<span class="ab ab-bow">'+t+'</span>':''}`;
const rise  = t => `<span class="ab ab-rise">起↑</span>${t?'<span class="ab ab-rise">'+t+'</span>':''}`;
const ask   = ()=> `<span class="ab ab-rise">問訊</span>`;
const kneel = t => `<span class="ab ab-kneel">${t||'長跪合掌'}</span>`;
const info  = t => `<span class="ab ab-info">${t}</span>`;
const chant = t => `<span class="ab ab-chant">${t}</span>`;
const walk  = t => `<span class="ab ab-walk">${t}</span>`;
const note  = t => `<div class="note">${t}</div>`;
const stand = ()=> `<span class="ab ab-rise">起身</span>`;

const CHANT = `南無喝囉怛那哆囉夜耶。南無阿唎耶。婆盧羯帝爍缽囉耶。菩提薩埵婆耶。摩訶薩埵婆耶。摩訶迦盧尼迦耶。唵。薩皤囉罰曳。數怛那怛寫。南無悉吉慄埵伊蒙阿唎耶。婆盧吉帝室佛囉楞馱婆。南無那囉謹墀。醯利摩訶皤哆沙咩。薩婆阿他豆輸朋。阿逝孕。薩婆薩哆那摩婆薩哆那摩婆伽。摩罰特豆。怛姪他。唵。阿婆盧醯。盧迦帝。迦羅帝。夷醯唎。摩訶菩提薩埵。薩婆薩婆。摩囉摩囉。摩醯摩醯唎馱孕。俱盧俱盧羯蒙。度盧度盧罰闍耶帝。摩訶罰闍耶帝。陀囉陀囉。地唎尼。室佛囉耶。遮囉遮囉。摩麼罰摩囉。穆帝隸。伊醯伊醯。室那室那。阿囉參佛囉舍利。罰沙罰參。佛囉舍耶。呼盧呼盧摩囉。呼盧呼盧醯利。娑囉娑囉。悉唎悉唎。蘇嚧蘇嚧。菩提夜菩提夜。菩馱夜菩馱夜。彌帝唎夜。那囉謹墀。地唎瑟尼那。波夜摩那。娑婆訶。悉陀夜。娑婆訶。摩訶悉陀夜。娑婆訶。悉陀喻藝。室皤囉耶。娑婆訶。那囉謹墀。娑婆訶。摩囉那囉。娑婆訶。悉囉僧阿穆佉耶。娑婆訶。娑婆摩訶阿悉陀夜。娑婆訶。者吉囉阿悉陀夜。娑婆訶。波陀摩羯悉哆夜。娑婆訶。那囉謹墀皤伽囉耶。娑婆訶。摩婆利勝羯囉夜。娑婆訶。南無喝囉怛那哆囉夜耶。南無阿唎耶。婆盧吉帝。爍皤囉夜。娑婆訶。唵。悉殿都。漫多囉。跋陀耶。娑婆訶。`;

// ── STEP 資料：每個 step 是一個畫面，body 是 innerHTML，動作標籤嵌在文字中 ──
const STEPS = [

  // ════════ 研修營筆記（一）════════
  { sec:'研修營筆記',
    body: `<strong>115/5/30（六）千手眼大悲心咒行法初階研修營</strong><br>
由果慨法師帶領學員們進行實修，於法鼓山新店分會舉辦，希望經由儀軌練習，讓學員們之後都能自行在家修行此法門。` },

  { sec:'研修營筆記',
    body: `<strong>一、實修前法師提點</strong><br>
果慨法師說明，以這次活動作為實驗，以禪修方法修《大悲懺》，和以法會唱誦的修行型態，發掘不同之處。本次活動如實驗成功的話，未來將不斷持續推廣。之前已上過七次堂課，最重要的是本次實修，定位為研修營。` },

  { sec:'研修營筆記',
    body: `修行首先要重視規矩。許多人認為規矩是束縛，但其實規矩如同道路上的紅綠燈，能保障安全，也能幫助行者更快速地抵達目的地。古代禪宗叢林中，初入禪堂往往先學規矩三年。修行一開始要有框架，在框架裡修行才安全，而規矩就是框架。` },

  { sec:'研修營筆記',
    body: `修行想有較深刻的體驗，最重要的關鍵點是放鬆。現代人生活忙碌，但修行並非在趕業績，從拜懺、誦經、行走，都能反映一個人是否真正放鬆。當身心放鬆時，持咒也會愈來愈專注。因此修行時要不斷提醒自己放鬆，如何放鬆？首先明白自己有福報參與研修營，把握難得的因緣，學習好好與自己相處。` },

  { sec:'研修營筆記',
    body: `修行需要有次第。首先要熟悉修行環境與作息安排，遵守結界範圍與共修規範。此次採取較開放的方式，參與者可依身心狀況調整行走持咒、打坐持咒與拜懺持咒的比例。這種修法重視自覺。在方法上，持咒是主軸，打坐則是輔助。而透過持咒打坐會坐得更好。拜懺的重點在調身，才能把方法用好用。三者相互配合，拜懺、持咒、打坐，方法由粗而細，引導修行者逐漸安定身心。` },

  { sec:'研修營筆記',
    body: `本法門是圓教法門，修行是往內修，自己是自己的監香。外在的監香無法監督每個人的心念，真正的監香是自己的覺照能力。修行由迷轉悟，是自己的心要轉。<br><br>
遵式大師說：「十科行軌，理觀為主。」一般用功是在事相上用功，拜懺、持咒、靜坐都只是方法、工具，不是最終目的；真正的目的，是開顯人人本具的佛性。理觀就是隨順我們的本心、真如、佛性，佛性可從即空即假即中來理解。` },

  { sec:'研修營筆記',
    body: `不動才能精準地動。所謂不動，是內心繫在方法上，精準地動是由護念自己進而護念其他人。由一個點默默擴大，用的是默照，就做兩件事：身體放鬆，專心持〈大悲咒〉。<br><br>
第二是培養整體觀。修行儀軌是整體的，但整體裡面有個人修法，不能只顧自己，要時時顧及他人。` },

  // ════════ 四 修供養 ════════
  { sec:'四　修供養',
    body: `南無大悲觀世音菩薩${info('（三稱三拜）')}<br><br>
當念一切三寶。及法界眾生。與我身心無二無別。諸佛已悟眾生尚迷。我為眾生翻迷障故。禮事三寶。作是念已口當唱言。<br><br>
一切恭謹。一心頂禮十方常住三寶。${bow()}${rise()}${ask()}` },

  { sec:'四　修供養',
    body: `是諸眾等各各胡跪。${kneel('跪')}<br><br>
嚴持香華如法供養。<br><br>
願此香華雲遍滿十方界。一一諸佛土無量香莊嚴。具足菩薩道成就如來香（我此香華遍十方。以為微妙光明臺。諸天音樂天寶香。諸天肴膳天寶衣。不可思議妙法塵。` },

  { sec:'四　修供養',
    body: `一一塵出一切塵。一一塵出一切法。旋轉無閡互莊嚴。遍至十方三寶前。十方法界三寶前。悉有我身修供養。一一皆悉遍法界。彼彼無雜無障閡。盡未來際作佛事。普熏法界諸眾生。蒙熏皆發菩提心。同入無生證佛智。）` },

  { sec:'四　修供養',
    body: `供養已${rise()}一切恭謹。${bow()}${rise()}${ask()}` },

  // ════════ 五 請三寶諸天 ════════
  { sec:'五　請三寶諸天',
    body: `${kneel()}<br><br>

  { sec:'五　請三寶諸天',

  { sec:'五　請三寶諸天',
    body: `一心奉請 南無華嚴菩薩。大莊嚴菩薩。寶藏菩薩摩訶薩。<br>
一心奉請 南無德藏菩薩。金剛藏菩薩。虛空藏菩薩摩訶薩。<br>

一心奉請 南無摩訶迦葉。無量無數大聲聞僧。<br><br>
一心奉請。善吒梵摩瞿婆伽天子。護世四王。天龍八部童目天女。虛空神。江海神。泉源神。河沼神。藥草樹林神。舍宅神。水神火神。風神土神。山神地神。宮殿神等。及守護持咒。一切天龍鬼神各及眷屬。${bow()}${stand()}${info('（以上奉請三次）')}` },

  { sec:'五　請三寶諸天',
    body: `唯願釋迦本師。彌陀慈父千光王靜住如來。十方三世一切諸佛。不移本際平等慈熏。來降道場證我行法。${bow()}${stand()}<br><br>
廣大圓滿無閡大悲心。總持祕要顯現道場。受我供養。${bow()}${stand()}<br><br>
千手千眼觀世音菩薩摩訶薩。乘本願力來到我前。神咒加持頓消三障。大勢至菩薩總持王等諸大菩薩。摩訶迦葉諸大聲聞。同運慈悲俱時來降。${bow()}${stand()}<br><br>
梵釋四王諸天八部。隨我請來。堅守道場擁護持咒。卻諸魔障示現吉祥。令我所修不違本願。${bow()}${rise()}${ask()}
${note('在家每日連續拜懺，只需第一天「奉請」；若中斷需重新「奉請」。')}` },

  // ════════ 六 讚歎伸誠 ════════
  { sec:'六　讚歎伸誠',

南無過去正法明如來。現前觀世音菩薩。成妙功德具大慈悲。於一身心現千手眼。照見法界護持眾生。令發廣大道心。教持圓滿神咒。永離惡道得生佛前。無間重愆纏身惡疾。莫能救濟悉使消除。三昧辨才現生求願。皆令果遂決定無疑。能使速獲三乘。早登佛地。威神之力歎莫能窮。故我一心歸命頂禮。${bow()}${rise()}${ask()}

  { sec:'八　發願持咒',
    body: `觀世音菩薩白佛言世尊。若諸眾生。誦持大悲神咒。墮三惡道者。我誓不成正覺。誦持大悲神咒。若不生諸佛國者。我誓不成正覺。誦持大悲神咒。若不得無量三昧辨才者。我誓不成正覺。誦持大悲神咒。於現在生中。一切所求若不果遂者。不得為大悲心陀羅尼也。乃至說是語已。於眾會前合掌正住。於諸眾生起大悲心開顏含笑。即說如是廣大圓滿無閡大悲心大陀羅尼神妙章句。陀羅尼曰。` },

  { sec:'八　發願持咒',

  { sec:'八　發願持咒',
    body: `觀世音菩薩說此咒已。大地六變震動。天雨寶華繽紛而下。十方諸佛悉皆歡喜。天魔外道恐怖毛豎。一切眾會皆獲果證。或得須陀洹果。或得斯陀含果。或得阿那含果。或得阿羅漢果者。或得一地二地三四五地乃至十地者。無量眾生發菩提心。` },

  // ════════ 九 懺悔 ════════
  { sec:'九　懺悔',
    body: `我及眾生${bow('頭碰地')} 無始常為三業六根。重罪所障。不見諸佛不知出要。但順生死不知妙理。我今雖知由與眾生。同為一切重罪所障。今對觀音十方佛前。普為眾生歸命懺悔。唯願加護令障消滅。${rise()}${ask()}
${note('或整段念完後，一次拜下、起身、問訊。')}` },

  { sec:'九　懺悔',
    body: `${kneel()}<br><br>
普為四恩三有。法界眾生。悉願斷除三障。歸命懺悔。<br><br>
我與眾生${bow('頭碰地')} 無始來今。由愛見故。內計我人。外加惡友。不隨喜他一毫之善。唯遍三業廣造眾罪。事雖不廣惡心遍布。晝夜相續無有間斷。覆諱過失不欲人知。不畏惡道。無慚無愧。撥無因果。` },

  { sec:'九　懺悔',
    body: `故於今日。深信因果。生重慚愧。生大怖畏。發露懺悔。斷相續心。發菩提心。斷惡修善。勤策三業翻昔重過。隨喜凡聖一毫之善。念十方佛有大福慧。能救拔我及諸眾生。從二死海置三德岸。從無始來不知諸法。本性空寂廣造眾惡。今知空寂為求菩提。為眾生故廣修諸善。遍斷眾惡。唯願觀音慈悲攝受。${rise()}${ask()}
${note('或整段念完後，一次拜下、起身、問訊。')}` },

  { sec:'九　懺悔',
    body: `${kneel()}<br><br>
至心懺悔${bow()} 比丘（某甲）等${stand()}。與法界一切眾生。現前一心。本具千法。皆有神力及以智明。上等佛心。下同含識。無始闇動。障此靜明。觸事昏迷。舉心縛著。平等法中起自他想。愛見為本身口為緣。於諸有中無罪不造。十惡五逆謗法謗人。` },

  { sec:'九　懺悔',
    body: `破戒破齋毀塔壞寺。偷僧祇物污淨梵行。侵損常住飲食財物。千佛出世不通懺悔。如是等罪無量無邊。捨茲形命合墮三塗。備嬰萬苦。復於現世眾惱交煎。或惡疾縈纏他緣逼迫。障於道法不得熏修。今遇<br><br>
大${bow()}悲圓滿神咒。速能滅除${stand()}如是罪障。故於今日至心誦持。歸向。` },

  { sec:'九　懺悔',
    body: `觀${bow()}世音菩薩及十方大師${stand()}。發菩提心修真言行。與諸眾生發露眾罪。求乞懺悔畢竟消除。唯願。<br><br>
大${bow()}悲觀世音菩薩摩訶薩。千手護持${stand()}千眼照見。令我等內外障緣寂滅。自他行願圓成。開本見知制諸魔外。三業精進修淨土因。至捨此身更無他趣。` },

  { sec:'九　懺悔',
    body: `決定得生${bow()}阿彌陀佛極樂世界${stand()}。親承供養大悲觀音。具諸總持廣度群品。皆出苦輪同到智地。<br><br>
懺悔發願已${rise('起立')} 歸命禮三寶${bow()}${rise()}${ask()}` },

  // ════════ 旋繞 ════════
  { sec:'旋繞',
    body: `${walk('向右旋繞三遍或七遍')}<br><br>

  { sec:'旋繞',
    body: `南無十方佛。南無十方法。南無十方僧。<br>
南無本師釋迦牟尼佛。南無阿彌陀佛。<br>

    { q:'Q1｜做動作時持咒比較散心？',
      a:'可能是有禪修底子或心比較攝定。絕大多數人剛修持咒時，身心不調，坐著會打瞌睡，所以不鼓勵坐下來。進入中階修行後，以持咒為主打坐為輔，就不太會起來走動。剛開始持咒時，走路是快的；持咒久了，移動步伐會變慢，因為心比較收攝。如果覺得坐著持咒比較安定，就用這方法，但不能讓自己睡著。禪修者要克服昏沉和散亂，要花很久時間。〈大悲咒〉比較複雜，心比較不容易散亂，是修定很快的方法。一邊修行持咒，有了比較強的著力點，進入禪觀比較容易。' },

    { q:'Q14｜儀軌中懺悔文有用嗎？',
      a:'古德把戒定慧融入到懺儀，持〈大悲咒〉是核心，前面請佛禮佛是因需要三寶加持，後面懺悔是消融業習。如能數天或一週修習此法門，相信會修到痛哭流涕，念懺悔文時，文字會打入內心。眾生心由大海變泡泡，再固化為冰塊，佛法打不進心會被彈回。大乘佛法採消融法，修行如融冰，需要長時精進（禪七、佛七）讓心安定，佛法才滲入、消融執著。規矩如框框，保護冰塊在安全範圍內融化，不致亂撞。' },
    { q:'Q15｜如何讓修行持續進步？',
      a:'不要讓修行停滯，主動創造「境」。持咒未滿108遍者，以108遍為目標持續努力。如持咒遍數滿108遍，維持三個月到半年後，增加到109、110遍，挑戰自己。從「做作業」到「做功課」，修行無止境，應持續突破。' },

// ── RENDER ENGINE ──
let cur = 0;
const area = document.getElementById('slide-area');

// 「下方還有經文」提示元素 + 取得該頁的捲動容器
const SCROLL_MORE_HTML = '<div class="scroll-more"><span class="scroll-more-pill">↓ 經文未完</span></div>';
function getScroller(slide){
  return slide ? (slide.querySelector('.qa-wrap') || slide.querySelector('.slide-inner')) : null;
}
function attachScroller(slide){
  const sc = getScroller(slide);
  if (sc) sc.addEventListener('scroll', () => {
    if (+slide.dataset.idx === cur) updateScrollHints();
  }, {passive:true});
}

function makeSlide(i) {
  const s = STEPS[i];
  const d = document.createElement('div');
  d.className = 'slide' + (i > 0 ? ' hr' : '');
  d.dataset.idx = i;

  if (s.cover) {
    d.innerHTML = `
      <div class="slide-cover">
        <div class="cover-top-bar"></div>
        <div class="cover-inner">
          <div class="cover-divider-thin"></div>
          <div class="cover-title-wrap">
            <div class="cover-title">千手眼大悲心咒<span class="cover-title-sub">行法</span></div>
          </div>
          <div class="cover-divider-thin"></div>
          <div class="cover-author">四明沙門知禮集</div>
        </div>
        <div class="cover-bottom-ornament">
          <div class="cover-bottom-line"></div>
        </div>
      </div>
      <div class="tap-hint">進入儀軌 ›</div>`;
    return d;
  }

  if (s.qa) {
    const items = s.items.map((item, j) => `
      <div class="qa-item" id="qa-${i}-${j}">
        <div class="qa-q" onclick="toggleQa('qa-${i}-${j}')">
          <span>${item.q}</span>
          <span class="qa-arrow">›</span>
        </div>
        <div class="qa-a">${item.a}</div>
      </div>`).join('');
    d.innerHTML = `
      <div class="slide-inner" style="padding:0;display:flex;flex-direction:column;">
        <div class="slide-sec" style="padding:.8rem 1rem .4rem;flex-shrink:0;">${s.sec}</div>
        <div class="qa-wrap">${items}</div>
      </div>` + SCROLL_MORE_HTML;
    attachScroller(d);
    return d;
  }

  d.innerHTML = `
    <div class="slide-inner">
      <div class="slide-sec">${s.sec}</div>
      ${s.body}
    </div>
    <div class="tap-hint">繼續 ›</div>` + SCROLL_MORE_HTML;
  attachScroller(d);
  return d;
}

function init() {
  STEPS.forEach((s,i) => area.appendChild(makeSlide(i)));
  buildMenu();
  update();
  requestAnimationFrame(updateScrollHints);
}

function getEl(i) { return area.querySelector('.slide[data-idx="'+i+'"]'); }

function go(dir) {
  const next = cur + dir;
  if (next < 0 || next >= STEPS.length) return;
  getEl(cur).classList.add(dir > 0 ? 'hl' : 'hr');
  const n = getEl(next);
  n.classList.remove('hr','hl');
  cur = next;
  const sc = getScroller(n);
  if (sc) sc.scrollTop = 0;
  update();
}

function jumpTo(i) {
  getEl(cur).classList.add(i > cur ? 'hl' : 'hr');
  const n = getEl(i);
  n.classList.remove('hr','hl');
  cur = i;
  const sc = getScroller(n);
  if (sc) sc.scrollTop = 0;
  update();
}

// 中央「繼續」：本頁還有經文沒看完 → 先往下捲；到底了才換頁
function smartContinue() {
  const sc = getScroller(getEl(cur));
  if (sc) {
    const scrollable = sc.scrollHeight - sc.clientHeight > 6;
    const atBottom = sc.scrollTop + sc.clientHeight >= sc.scrollHeight - 6;
    if (scrollable && !atBottom) {
      sc.scrollBy({top: sc.clientHeight * 0.85, behavior:'smooth'});
      return;
    }
  }
  go(1);
}

// 依本頁捲動狀態，更新「下方還有經文」提示、進度條、繼續鈕文字
function updateScrollHints() {
  const slide = getEl(cur);
  if (!slide) return;
  const sc = getScroller(slide);
  const more = slide.querySelector('.scroll-more');
  const pp = document.getElementById('page-progress');
  const ppFill = document.getElementById('page-progress-fill');
  const ct = document.getElementById('center-tap');

  if (!sc) { // 封面等無捲動內容的頁面
    slide.classList.remove('has-more','read-done');
    pp.style.display = 'none';
    if (ct) { ct.innerHTML = '進入儀軌 ›'; ct.classList.add('ready'); }
    return;
  }

  const scrollable = sc.scrollHeight - sc.clientHeight > 6;
  const atBottom = sc.scrollTop + sc.clientHeight >= sc.scrollHeight - 6;

  slide.classList.toggle('has-more', scrollable && !atBottom);
  slide.classList.toggle('read-done', scrollable && atBottom);

  if (more) {
    const sb = slide.getBoundingClientRect();
    const cb = sc.getBoundingClientRect();
    more.style.bottom = Math.max(0, sb.bottom - cb.bottom) + 'px';
  }

  if (scrollable) {
    pp.style.display = 'block';
    const pct = sc.scrollTop / (sc.scrollHeight - sc.clientHeight) * 100;
    ppFill.style.height = Math.min(100, Math.max(0, pct)) + '%';
  } else {
    pp.style.display = 'none';
  }

  if (ct) {
    const ready = !scrollable || atBottom;
    ct.innerHTML = ready ? '點此繼續 ›' : '↓ 下滑看經文';
    ct.classList.toggle('ready', ready);
  }
}

function update() {
  const s = STEPS[cur];
  document.getElementById('section-label').textContent = s.sec;
  document.getElementById('step-counter').textContent = (cur+1)+'/'+STEPS.length;
  document.getElementById('progress-bar').style.width = Math.round((cur+1)/STEPS.length*100)+'%';
  document.getElementById('btn-prev').disabled = cur === 0;
  document.getElementById('btn-next').disabled = cur === STEPS.length-1;
  document.querySelectorAll('.menu-item').forEach(el =>
    el.classList.toggle('active', +el.dataset.idx === cur));
  updateScrollHints();
}

function buildMenu() {
  const panel = document.getElementById('menu-panel');
  const seen = new Set();
  STEPS.forEach((s,i) => {
    if (seen.has(s.sec)) return;
    seen.add(s.sec);
    const b = document.createElement('button');
    b.className = 'menu-item';
    b.dataset.idx = i;
    const [num,...rest] = s.sec.split('　');
    b.innerHTML = `<span class="menu-num">${num}</span>${rest.join('　')||s.sec}`;
    b.onclick = () => { jumpTo(i); closeMenu(); };
    panel.appendChild(b);
  });
}

function toggleMenu() { document.getElementById('menu-overlay').classList.toggle('open'); }
function closeMenu()  { document.getElementById('menu-overlay').classList.remove('open'); }

// swipe（提高門檻、要求夠水平且夠快，避免拜懺動作中誤觸跳頁）
let tx = 0, ty = 0, tt = 0;
area.addEventListener('touchstart', e => {
  tx = e.touches[0].clientX; ty = e.touches[0].clientY; tt = Date.now();
}, {passive:true});
area.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  const dt = Date.now() - tt;
  if (Math.abs(dx) > 90 && Math.abs(dx) > Math.abs(dy) * 2 && dt < 600) {
    go(dx < 0 ? 1 : -1);
  }
}, {passive:true});

window.addEventListener('resize', updateScrollHints);

function toggleQa(id) {
  const item = document.getElementById(id);
  if (!item) return;
  item.classList.toggle('open');
  updateScrollHints();
}

// ── 拜懺模式：點經文區任意處 = smartContinue ──
let prostrateMode = false;
try { prostrateMode = localStorage.getItem('dabeizhan-prostrate') === '1'; } catch(e) {}

function applyProstrate() {
  const btn = document.getElementById('prostrate-btn');
  btn.classList.toggle('on', prostrateMode);
  btn.textContent = prostrateMode ? '🙏 拜懺中' : '🙏 拜懺';
  document.body.classList.toggle('prostrate', prostrateMode);
}

// 拜懺模式：點經文區任何位置 = smartContinue（只用 click，避免 touchend+click 雙觸發）
area.addEventListener('click', e => {
  if (!prostrateMode) return;
  if (e.target.closest('.qa-q')) return;
  smartContinue();
});

function toggleProstrate() {
  prostrateMode = !prostrateMode;
  try { localStorage.setItem('dabeizhan-prostrate', prostrateMode ? '1' : '0'); } catch(e) {}
  applyProstrate();
}

applyProstrate();

const FS_CLASSES = ['fs-s', '', 'fs-large', 'fs-xlarge', 'fs-xxlarge', 'fs-3xl', 'fs-4xl', 'fs-5xl'];
const FS_LABELS  = ['最小', '標準', '大', '特大', '超大'];
let fsLevel = 1;
try { fsLevel = parseInt(localStorage.getItem('dabeizhan-fs') || '1'); } catch(e) {}

function applyFs() {
  document.body.classList.remove('fs-s','fs-large','fs-xlarge','fs-xxlarge');
  if (FS_CLASSES[fsLevel]) document.body.classList.add(FS_CLASSES[fsLevel]);
  document.getElementById('fs-down').disabled = fsLevel === 0;
  document.getElementById('fs-up').disabled   = fsLevel === FS_CLASSES.length - 1;
  updateScrollHints();
}

function setFs(dir) {
  fsLevel = Math.max(0, Math.min(FS_CLASSES.length - 1, fsLevel + dir));
  try { localStorage.setItem('dabeizhan-fs', fsLevel); } catch(e) {}
  applyFs();
}

applyFs();
let wakeLockSentinel = null;
const wlBtn = document.getElementById('wl');

function setWlStatus(state) {
  if (state === 'on')      { wlBtn.textContent = '💡 常亮中'; wlBtn.style.background = 'rgba(255,220,100,.25)'; }
  else if (state === 'off'){ wlBtn.textContent = '💡 常亮'; wlBtn.style.background = 'rgba(255,255,255,.15)'; }
  else if (state === 'err'){ wlBtn.textContent = '💡 需HTTPS'; wlBtn.style.background = 'rgba(255,100,100,.25)'; wlBtn.title = '螢幕常亮需在 HTTPS 網頁開啟（如 GitHub Pages），直接開啟 html 檔案不支援'; }
  else if (state === 'no') { wlBtn.textContent = '💡 不支援'; wlBtn.style.background = 'rgba(150,150,150,.25)'; wlBtn.title = '此瀏覽器不支援螢幕常亮功能'; }
}

async function requestWakeLock() {
  try {
    wakeLockSentinel = await navigator.wakeLock.request('screen');
    setWlStatus('on');
    wakeLockSentinel.addEventListener('release', () => {
      wakeLockSentinel = null;
      setWlStatus('off');
    });
  } catch(e) {
    wakeLockSentinel = null;
    // SecurityError = not HTTPS
    if (e.name === 'SecurityError' || location.protocol === 'file:') {
      setWlStatus('err');
    } else {
      setWlStatus('off');
    }
  }
}

async function toggleWakeLock() {
  if (!('wakeLock' in navigator)) { setWlStatus('no'); return; }
  if (wakeLockSentinel) {
    await wakeLockSentinel.release();
    // status updated by 'release' event above
  } else {
    await requestWakeLock();
  }
}

// auto-request on load
if ('wakeLock' in navigator) {
  if (location.protocol === 'file:') {
    setWlStatus('err');
  } else {
    requestWakeLock();
  }
} else {
  setWlStatus('no');
}

// re-acquire when tab becomes visible again
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && !wakeLockSentinel && location.protocol !== 'file:') {
    if ('wakeLock' in navigator) requestWakeLock();
  }
});

init();
</script>
